<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de Materialize CSS</title>
    <!-- https://materializecss.com/ -->

    <!--Import Google Icon Font-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

    <!-- Compiled and minified JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

</head>

<body>

    <nav>
        <div class="nav-wrapper">
            <a href="#!" class="brand-logo">Logo</a>
            <ul class="right hide-on-med-and-down">
                <li><a class="waves-effect waves-light btn">Button</a></li>
                <li><a class="waves-effect waves-light btn">Button <i class="material-icons right">cloud</i></a></li>
                <li><a class="waves-effect waves-light btn-large">Large Button</a></li>
            </ul>
        </div>
    </nav>


    <div class="chip">
        <img src="https://cdn3.iconfinder.com/data/icons/business-avatar-1/512/5_avatar-128.png"
            alt="Contact Person">
        Jane Doe
    </div>

    <div class="col s12 m7">
        <h2 class="header">Horizontal Card</h2>
        <div class="card horizontal">
            <div class="card-image">
                <img src="https://cdn3.iconfinder.com/data/icons/education-209/64/paper-clip-academic-note-exam-256.png">
            </div>
            <div class="card-stacked">
                <div class="card-content">
                    <p>I am a very simple card. I am good at containing small bits of information.</p>
                </div>
                <div class="card-action">
                    <a href="#">This is a link</a>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
